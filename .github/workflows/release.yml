name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build CLI fat JAR
        run: ./gradlew :avro-checks-cli:jar -PincludeQuarkus=false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "avro-checks-cli ${{ steps.version.outputs.VERSION }}"
          body: |
            ## avro-checks-cli ${{ steps.version.outputs.VERSION }}

            A command-line tool for checking Avro schema compatibility.

            ### Usage
            ```
            java -jar avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar --help
            java -jar avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar <new-schema.json> <prev-schema.json> [LEVEL]
            java -jar avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar -f new.avsc prev.avsc [LEVEL]
            ```

            ### Requirements
            - Java 21+
          files: avro-checks-cli/build/libs/avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar
          fail_on_unmatched_files: true
