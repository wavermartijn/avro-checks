name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Build CLI fat JAR
        run: ./gradlew :avro-checks-cli:jar -PincludeQuarkus=false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "avro-checks-cli ${{ steps.version.outputs.VERSION }}"
          body: |
            ## avro-checks-cli ${{ steps.version.outputs.VERSION }}

            Two artifacts are available:

            | Artifact | Description |
            |---|---|
            | `avro-checks-cli-*.jar` | Fat JAR — requires Java 21+ |
            | `avro-checks-quarkus-cli-*-runner` | Native binary for Linux x86_64 — no JVM needed |

            ### Fat JAR usage
            ```
            java -jar avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar --help
            java -jar avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar <new-schema.json> <prev-schema.json> [LEVEL]
            java -jar avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar -f new.avsc prev.avsc [LEVEL]
            ```

            ### Native binary usage (Linux x86_64)
            ```
            chmod +x avro-checks-quarkus-cli-${{ steps.version.outputs.VERSION }}-runner
            ./avro-checks-quarkus-cli-${{ steps.version.outputs.VERSION }}-runner --help
            ```
          files: avro-checks-cli/build/libs/avro-checks-cli-${{ steps.version.outputs.VERSION }}.jar
          fail_on_unmatched_files: true

  native-release:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Read version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Pin Gradle wrapper to 8.12.1 (required by Quarkus 3.8.1)
        run: |
          sed -i 's|gradle-9[^/]*/|gradle-8.12.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.12.1-bin.zip|' gradle/wrapper/gradle-wrapper.properties

      - name: Build Quarkus native binary (container build)
        run: |
          ./gradlew :avro-checks-quarkus-cli:build \
            -Dquarkus.native.enabled=true \
            -Dquarkus.native.container-build=true \
            --no-daemon

      - name: Rename native binary
        run: |
          mv avro-checks-quarkus-cli/build/avro-checks-quarkus-cli-runner \
             avro-checks-quarkus-cli/build/avro-checks-quarkus-cli-${{ steps.version.outputs.VERSION }}-runner

      - name: Upload native binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: avro-checks-quarkus-cli/build/avro-checks-quarkus-cli-${{ steps.version.outputs.VERSION }}-runner
          fail_on_unmatched_files: true
